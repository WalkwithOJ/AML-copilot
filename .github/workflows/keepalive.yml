name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ping AML Copilot
        run: |
          curl -sS -L --max-time 60 --retry 3 --retry-delay 10 \
            -A "Mozilla/5.0 (compatible; keepalive-bot/1.0)" \
            "https://aml-copilot.streamlit.app/?keepalive=$(date +%s)" \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n"

      - uses: actions/checkout@v4

      - name: Keep workflow active
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > .github/last-keepalive
          git add .github/last-keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
