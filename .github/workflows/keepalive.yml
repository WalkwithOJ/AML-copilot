name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Wake app with real browser session
        run: |
          python - <<'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  print("Loading app...")
                  await page.goto("https://aml-copilot.streamlit.app", timeout=90000)
                  try:
                      wake = page.get_by_text("Yes, get this app back up!")
                      await wake.wait_for(timeout=5000)
                      print("App was sleeping — clicking wake button...")
                      await wake.click()
                  except Exception:
                      print("App already awake.")
                  await page.wait_for_timeout(20000)
                  print("Done.")
                  await browser.close()

          asyncio.run(main())
          PYEOF

      - name: Keep workflow active
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u > .github/last-keepalive
          git add .github/last-keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
